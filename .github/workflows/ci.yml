name: IUT Cafeteria CI Pipeline

# TRIGGER: run on every push to main, and on every Pull Request to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # JOB 1: Run all unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install stock-service dependencies
        run: npm install
        working-directory: services/stock-service

      # If ANY test fails, this step fails and the whole pipeline turns RED
      - name: Run stock service tests
        run: npm test
        working-directory: services/stock-service

  # JOB 2: Verify all Dockerfiles build (only runs if tests pass)
