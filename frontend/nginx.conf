server {
  listen 80;

  # Serve React static files for all routes
  location / {
    root /usr/share/nginx/html;
    # try_files is required for React Router — all unknown paths get index.html
    try_files $uri $uri/ /index.html;
  }

  # Proxy /api/ calls to Order Gateway (strips /api prefix)
  location /api/ {
    proxy_pass http://order-gateway:3002/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Proxy Socket.io to Notification Hub (WebSocket upgrade required)
  location /socket.io/ {
    proxy_pass http://notification-hub:3005;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
  }
}