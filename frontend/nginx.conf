server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # All /api/* requests → order-gateway:3002
    location /api/ {
        proxy_pass         http://order-gateway:3002/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
    }

    # Socket.io → notification-hub:3005
    # This is what makes live order status updates work
    location /socket.io/ {
        proxy_pass         http://notification-hub:3005/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # All other requests → React app (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}